# Dependabot version updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  # The "pip" ecosystem reads PEP 621 dependencies; aeroza is uv-managed but
  # uv reads the same pyproject.toml, so updates Dependabot proposes here
  # carry over cleanly when uv re-locks.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Pin actions referenced in our workflows (setup-uv, checkout, upload-artifact, …).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
