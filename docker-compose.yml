name: aeroza

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: aeroza-postgres
    environment:
      POSTGRES_DB: aeroza
      POSTGRES_USER: aeroza
      POSTGRES_PASSWORD: aeroza
    ports:
      - "5432:5432"
    volumes:
      - aeroza-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroza -d aeroza"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aeroza-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - aeroza-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: aeroza-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - aeroza-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  aeroza-postgres-data:
  aeroza-redis-data:
  aeroza-nats-data:
